<!DOCTYPE html>
<html>
<head>
    <title>AI Student Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎓 AI Student Planner</h1>

<div class="container">

    <div id="output"></div>
</div>

<script src="script.js"></script>

</body>
</html>
